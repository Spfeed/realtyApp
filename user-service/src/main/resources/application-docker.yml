spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/user_db
    username: postgres
    password: 1234

eureka:
  client:
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

media:
  upload-path: /app/uploads
  public-url-prefix: /api/users/media