spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/listing_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

eureka:
  client:
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

media:
  upload-path: /app/uploads
  public-url-prefix: /api/listings/media