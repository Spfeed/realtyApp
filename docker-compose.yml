services:
  postgres:
    image: postgres:16
    container_name: realty-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - realty-network
      
  pgadmin:
    image: dpage/pgadmin4
    container_name: realty-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - realty-network

  redis:
    image: redis:7
    container_name: realty-redis
    ports:
      - "6379:6379"
    networks:
      - realty-network
  
  service-discovery:
    build:
      context: ./service-discovery
    container_name: service-discovery
    ports:
      - "8761:8761"
    networks:
      - realty-network

  kafka:
    image: apache/kafka:3.9.0
    container_name: realty-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - realty-network

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - service-discovery
    networks:
      - realty-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-discovery
      - auth-service
    networks:
      - realty-network

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - service-discovery
      - auth-service
    volumes:
      - user-uploads:/app/uploads
    networks:
      - realty-network

  listing-service:
    build:
      context: ./listing-service
    container_name: listing-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - service-discovery
      - auth-service
      - user-service
      - redis
      - kafka
    volumes:
      - listing-uploads:/app/uploads
    environment:
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
    networks:
      - realty-network

  application-service:
    build:
      context: ./application-service
    container_name: application-service
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - service-discovery
      - auth-service
      - user-service
      - listing-service
      - kafka
    environment:
      APPLICATION_SERVICE_TOKEN: ${APPLICATION_SERVICE_TOKEN}
    networks:
      - realty-network

  chat-service:
    build:
      context: ./chat-service
    container_name: chat-service
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - service-discovery
      - auth-service
      - user-service
      - listing-service
      - application-service
      - kafka
    networks:
      - realty-network

  review-service:
    build:
      context: ./review-service
    container_name: review-service
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - service-discovery
      - auth-service
      - user-service
      - listing-service
      - kafka
    environment:
      REVIEW_SERVICE_TOKEN: ${REVIEW_SERVICE_TOKEN}
    networks:
      - realty-network

  recommendation-service:
    build:
      context: ./recommendation-service
    container_name: recommendation-service
    ports:
      - "8088:8088"
    depends_on:
      - postgres
      - service-discovery
      - auth-service
      - listing-service
      - kafka
    environment:
      RECOMMENDATION_SERVICE_TOKEN: ${RECOMMENDATION_SERVICE_TOKEN}
    networks:
      - realty-network

  ml-service:
    build:
      context: ./realty-ml-service
    container_name: ml-service
    ports:
      - "8090:8090"
    environment:
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN}

      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8088
      LISTING_SERVICE_URL: http://listing-service:8083

      EUREKA_SERVER_URL: http://service-discovery:8761/eureka/
      ML_SERVICE_HOST: ml-service
      ML_SERVICE_PORT: 8090

      DEBUG_ENDPOINTS_ENABLED: "true"
    depends_on:
      - service-discovery
      - recommendation-service
      - listing-service
    networks:
      - realty-network

  frontend:
    build:
      context: ./realty-frontend
      args:
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
    container_name: realty-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - realty-network

volumes:
  postgres-data:
  user-uploads:
  listing-uploads:

networks:
  realty-network:
    driver: bridge